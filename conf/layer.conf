# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-tether"
BBFILE_PATTERN_meta-tether = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-tether = "6"

LAYERDEPENDS_meta-tether = "core"
LAYERSERIES_COMPAT_meta-tether = "scarthgap"
