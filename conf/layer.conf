# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-tether"
BBFILE_PATTERN_meta-tether = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-tether = "10"

# This layer depends on poky/meta, poky/meta-poky, meta-openembedded/meta-oe and meta-raspberrypi
LAYERDEPENDS_meta-tether = " \
    core \
    yocto \
    openembedded-layer \
    raspberrypi \
"
LAYERSERIES_COMPAT_meta-tether = "scarthgap"
